<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Plate</title>
  <style>
    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: url('pins/realistic-blue-smoke-spread-black-background%20(1).jpg') center/cover no-repeat;
      background-color: #000;
    }

    .plate {
      width: 90vw;
      height: 50vh;
      max-width: 800px;
      max-height: 400px;
      background: radial-gradient(circle, rgba(0,0,0,0.7) 0%, rgba(139,0,0,0.7) 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border-radius: 25px;
      border: 2px solid red;
      opacity: 0;
      transform: translateY(-30px);
      animation: plateFadeIn 1s ease forwards 0.5s;
      backdrop-filter: blur(10px);
      padding: 10px 0;
    }

    .text {
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      font-size: 24px;
      margin: 5px 0;
      opacity: 0;
      transform: translateY(-20px);
      animation: textFadeIn 1s ease forwards;
    }

    .text:nth-child(1) { animation-delay: 1s; }
    .text:nth-child(2) { animation-delay: 1.2s; }
    .text:nth-child(3) { animation-delay: 1.4s; }
    .text:nth-child(4) { animation-delay: 1.6s; }

    .gif-container {
      padding: 4px;
      margin-bottom: 20px;
      border-radius: 4px;
      background: rgba(0,0,0,0.15);
      width: 100%;
      max-width: 700px;
      opacity: 0;
      transform: translateY(-30px);
      animation: gifFadeIn 1s ease forwards;
      backdrop-filter: blur(5px);
    }

    .gif-container img {
      display: block;
      width: 100%;
      height: auto;
      border: none;
    }

    @keyframes plateFadeIn {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes textFadeIn {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes gifFadeIn {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="gif-container">
    <img src="pins/grimmjow-jaegerjaquez-bleach-tybw.gif" alt="Grimmjow GIF">
  </div>
  <div class="plate">
    <div class="text">rrazze / rrazzew / nnaib</div>
    <div class="text">he / him</div>
    <div class="text">rrazze / rrazzew / nnaib</div>
    <div class="text">enfj 7w6 sx7 sx7sx4sx8 velf sanguine / phlegmatic</div>
  </div>
</body>
</html>
