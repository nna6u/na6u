<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Plate</title>
  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #000;
    }

    .plate {
      width: 400px;
      height: 200px;
      background: radial-gradient(circle, #00BFFF 0%, #000000 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border-radius: 10px;
    }

    .text {
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      font-size: 24px;
      margin: 5px 0;
    }
  </style>
</head>
<body>
  <div class="plate">
    <div class="text">nna6u  rrazze</div>
    <div class="text">he  him</div>
    <div class="text">kkk</div>
  </div>
</body>
</html>
